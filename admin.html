<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<script>
if (localStorage.getItem("ownerLoggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>


<header>
<h1>VISION SUPPLY</h1>
<p>Owner Dashboard</p>
</header>


<section>

<h2>Add Product</h2>

<input id="productName" placeholder="Product name">
<br><br>

<input id="productPrice" placeholder="Price">
<br><br>

<input id="productImage" placeholder="Image link">
<br><br>

<select id="status">

</select>

<br><br>

<button onclick="addProduct()">Add Product</button>


</section>


<section>

<h2>Your Products</h2>

<div id="products"></div>

</section>


<script src="admin.js"></script>

</body>

</html>
