<!DOCTYPE html>
<html>
<head>
  <title>Vision Supply</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      border-bottom: 1px solid #333;
    }

    h1 {
      font-size: 45px;
      letter-spacing: 5px;
      color: #d4af37;
    }

    p {
      color: #ccc;
      font-size: 18px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 40px;
    }

    .card {
      background: #111;
      border: 1px solid #333;
      border-radius: 15px;
      padding: 25px;
      width: 250px;
    }

    .card h2 {
      color: #d4af37;
    }

    button {
      background: #d4af37;
      border: none;
      padding: 12px 25px;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    footer {
      padding: 30px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>VISION SUPPLY</h1>
  <p>Luxury fragrances. Premium style.</p>
</header>

<section class="products">

<div class="card">
<h2>Dior</h2>
<p>Premium fragrance collection</p>
<button>Order</button>
</div>

<div class="card">
<h2>Tom Ford</h2>
<p>Luxury scents available</p>
<button>Order</button>
</div>

<div class="card">
<h2>Gucci</h2>
<p>New drops coming soon</p>
<button>Order</button>
</div>

</section>

<footer>
<p>© 2026 Vision Supply</p>
</footer>

</body>
</html>
